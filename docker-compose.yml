services:
  xbol-admin_portal:
    container_name: xbol-admin_portal
    build:
      context: ./Odasoft.XBOL.AdminPortal
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
    networks:
      - xbol-network

networks:
  xbol-network:
    external: true
